name: CI/CD Pipeline - Microservicio Inscripción

on:
  push:
    branches: [ main, master ]

jobs:
  # ============================================================
  # JOB 1: Compila el proyecto y corre las pruebas (sin Docker).
  # Si falla aquí, el problema es del código Java / pom.xml.
  # ============================================================
  build-and-test:
    name: Build y Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17 Temurin
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

  # ============================================================
  # JOB 2: Construye la imagen Docker y la sube a Docker Hub.
  # Si falla aquí, el problema es del Dockerfile o login a Docker Hub.
  # ============================================================
  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # JOB 3: Despliega el contenedor en EC2-APP vía SSH, inyectando
  # las variables de entorno que application.properties espera
  # (incluye el issuer de Azure AD B2C) y valida con /actuator/health.
  # Si falla aquí, el problema es de SSH, Security Group, o
  # credenciales de AWS Academy vencidas.
  # ============================================================
  deploy-ec2:
    name: Deploy en EC2
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy a EC2 vía SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:latest
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AZURE_AD_B2C_ISSUER_URI: ${{ secrets.AZURE_AD_B2C_ISSUER_URI }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          ssh -o StrictHostKeyChecking=no -i private_key.pem "$USER@$HOST" \
            "AWS_REGION='$AWS_REGION' \
             AWS_ACCESS_KEY_ID='$AWS_ACCESS_KEY_ID' \
             AWS_SECRET_ACCESS_KEY='$AWS_SECRET_ACCESS_KEY' \
             AWS_SESSION_TOKEN='$AWS_SESSION_TOKEN' \
             AWS_S3_BUCKET_NAME='$AWS_S3_BUCKET_NAME' \
             AZURE_AD_B2C_ISSUER_URI='$AZURE_AD_B2C_ISSUER_URI' \
             DOCKER_IMAGE='$DOCKER_IMAGE' \
             DOCKERHUB_USERNAME='$DOCKERHUB_USERNAME' \
             DOCKERHUB_TOKEN='$DOCKERHUB_TOKEN' \
             bash -s" << 'REMOTE_SCRIPT'

            set -e

            echo "=== Instalando Docker si no está instalado (Amazon Linux 2023 / dnf) ==="
            if ! command -v docker &> /dev/null; then
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker "$USER"
            fi

            echo "=== Iniciando sesión en Docker Hub ==="
            echo "$DOCKERHUB_TOKEN" | sudo docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            echo "=== Deteniendo contenedor anterior ==="
            sudo docker stop microservices-app 2>/dev/null || echo "No había contenedor corriendo"
            sudo docker rm microservices-app 2>/dev/null || echo "No había contenedor para eliminar"

            echo "=== Descargando la última imagen ==="
            sudo docker pull "$DOCKER_IMAGE"

            echo "=== Ejecutando el nuevo contenedor ==="
            # Las variables se inyectan como -e porque application.properties
            # las referencia con ${VAR:default} (ver AwsS3Config.java y
            # spring.security.oauth2.resourceserver.jwt.issuer-uri).
            sudo docker run -d \
              --name microservices-app \
              --restart unless-stopped \
              -p 8080:8080 \
              -e AWS_REGION="$AWS_REGION" \
              -e AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
              -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
              -e AWS_SESSION_TOKEN="$AWS_SESSION_TOKEN" \
              -e AWS_S3_BUCKET_NAME="$AWS_S3_BUCKET_NAME" \
              -e AZURE_AD_B2C_ISSUER_URI="$AZURE_AD_B2C_ISSUER_URI" \
              "$DOCKER_IMAGE"

            echo "=== Verificando que el contenedor está corriendo ==="
            sudo docker ps

            echo "=== Esperando a que Spring Boot levante ==="
            sleep 20

            echo "=== Health check (endpoint público /actuator/health) ==="
            curl -f http://localhost:8080/actuator/health || {
              echo "El health check falló. Mostrando logs del contenedor:"
              sudo docker logs --tail 50 microservices-app
              exit 1
            }

            echo "=== Últimas líneas del log ==="
            sudo docker logs --tail 30 microservices-app

            echo "=== Limpieza de imágenes antiguas ==="
            sudo docker image prune -f
          REMOTE_SCRIPT

          rm -f private_key.pem
