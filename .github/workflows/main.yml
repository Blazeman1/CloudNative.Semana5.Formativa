name: CI/CD Pipeline - Microservicio Inscripción

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build y Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17 Temurin
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

  docker-build-push:
    name: Docker Build & Push
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservicios-inscripcion:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservicios-inscripcion:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy en EC2
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      # Genera application.yml con los valores de conexión a AWS y el issuer
      # de Azure AD B2C (ver guía Semana 5, Paso 1: "Integrando el API Manager").
      # Recuerda refrescar los secretos AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
      # AWS_SESSION_TOKEN en GitHub Actions cada vez que enciendas el laboratorio.
      - name: Generar application.yml
        run: |
          cat > application.yml << EOF
          aws:
            region: ${{ secrets.AWS_REGION }}
            accessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
            secretKey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            sessionToken: ${{ secrets.AWS_SESSION_TOKEN }}
            s3:
              region: ${{ secrets.AWS_REGION }}
              bucket-name: ${{ secrets.AWS_S3_BUCKET_NAME }}
          spring:
            security:
              oauth2:
                resourceserver:
                  jwt:
                    issuer-uri: ${{ secrets.AZURE_AD_B2C_ISSUER_URI }}
          EOF

      - name: Copiar application.yml a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "application.yml"
          target: "/home/${{ secrets.EC2_USER }}/"

      - name: Desplegar contenedor en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/microservicios-inscripcion:latest
            docker stop microservicio.inscripcion || true
            docker rm microservicio.inscripcion || true
            docker run -d \
              --name microservicio.inscripcion \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /home/${{ secrets.EC2_USER }}/application.yml:/app/config/application.yml \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME }} \
              -e AZURE_AD_B2C_ISSUER_URI=${{ secrets.AZURE_AD_B2C_ISSUER_URI }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/microservicios-inscripcion:latest

      # Health check contra /actuator/health: este endpoint queda público en
      # SecurityConfig.java precisamente para que el pipeline pueda verificar
      # el despliegue sin necesitar un token JWT de Azure AD B2C.
      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 15
            curl -f http://localhost:8080/actuator/health || exit 1
            docker image prune -f
