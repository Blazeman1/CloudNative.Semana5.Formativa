name: Deploy Spring Boot Microservice

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Configurar Buildx con driver docker-container
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Crear el archivo de configuración
      - name: Create application.yml from secrets
        run: |
          cat > src/main/resources/application.yml << EOF
          spring:
            datasource:
              url: ${{ secrets.DB_URL }}
              username: ${{ secrets.DB_USERNAME }}
              password: ${{ secrets.DB_PASSWORD }}
              driver-class-name: com.mysql.cj.jdbc.Driver
            jpa:
              hibernate:
                ddl-auto: update
              show-sql: true
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQL8Dialect
            security:
              oauth2:
                resourceserver:
                  jwt:
                    issuer-uri: ${{ secrets.AZURE_ISSUER_URI }}
          aws:
            accessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
            secretKey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            sessionToken: ${{ secrets.AWS_SESSION_TOKEN }}
            s3:
              region: ${{ secrets.AWS_REGION }}
              bucket-name: ${{ secrets.AWS_S3_BUCKET }}
          EOF

      # Construir la imagen Docker (sin cache para evitar errores)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:${{ github.sha }}
          # Opcional: Si quieres usar cache, descomenta estas líneas
          # cache-from: type=gha
          # cache-to: type=gha,mode=max

      - name: Deploy to EC2
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Conectar por SSH y ejecutar la aplicación
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST << 'EOF'
            # Instalar Java si no está instalado
            if ! command -v java &> /dev/null; then
              sudo dnf install -y java-17-amazon-corretto-devel
            fi
          
            # Detener la aplicación anterior
            sudo pkill -f 'java -jar' || true
          
            # Ejecutar la nueva aplicación
            cd /home/$USER
            sudo java -jar app.jar > app.log 2>&1 &
            sleep 10
          
            # Verificar que está corriendo
            ps aux | grep java
            echo "Aplicación desplegada exitosamente"
          EOF
          
          rm -f private_key.pem