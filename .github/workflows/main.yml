name: Deploy Spring Boot Microservice with Docker

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create application.yml from secrets
        run: |
          cat > src/main/resources/application.yml << EOF
          spring:
            datasource:
              url: ${{ secrets.DB_URL }}
              username: ${{ secrets.DB_USERNAME }}
              password: ${{ secrets.DB_PASSWORD }}
              driver-class-name: com.mysql.cj.jdbc.Driver
            jpa:
              hibernate:
                ddl-auto: update
              show-sql: true
              properties:
                hibernate:
                  dialect: org.hibernate.dialect.MySQL8Dialect
            security:
              oauth2:
                resourceserver:
                  jwt:
                    issuer-uri: ${{ secrets.AZURE_ISSUER_URI }}
          aws:
            accessKeyId: ${{ secrets.AWS_ACCESS_KEY_ID }}
            secretKey: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            sessionToken: ${{ secrets.AWS_SESSION_TOKEN }}
            s3:
              region: ${{ secrets.AWS_REGION }}
              bucket-name: ${{ secrets.AWS_S3_BUCKET }}
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:${{ github.sha }}

      - name: Deploy to EC2 with Docker
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USER }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/microservices-inscription:latest
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USER@$HOST << EOF
            echo "=== Instalando Docker si no está instalado ==="
            if ! command -v docker &> /dev/null; then
              sudo dnf install -y docker
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker \$USER
            fi
          
            echo "=== Iniciando sesión en Docker Hub ==="
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          
            echo "=== Deteniendo contenedor anterior ==="
            sudo docker stop microservices-app 2>/dev/null || echo "No había contenedor corriendo"
            sudo docker rm microservices-app 2>/dev/null || echo "No había contenedor para eliminar"
          
            echo "=== Descargando la última imagen ==="
            sudo docker pull $DOCKER_IMAGE
          
            echo "=== Ejecutando el nuevo contenedor ==="
            sudo docker run -d --name microservices-app -p 8080:8080 $DOCKER_IMAGE
          
            echo "=== Verificando que el contenedor está corriendo ==="
            sudo docker ps
            echo ""
            echo "=== Últimas líneas del log ==="
            sudo docker logs --tail 20 microservices-app
          EOF
          
          rm -f private_key.pem