# ===== Servidor =====
server.port=8080

# ===== Base de datos H2 en memoria =====
spring.datasource.url=jdbc:h2:mem:cursosdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# ===== AWS S3 =====
# Las credenciales se inyectan como variables de entorno (ver Dockerfile / GitHub Actions).
# Soporta credenciales temporales de AWS Academy (incluyen sessionToken).
aws.s3.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}
aws.sessionToken=${AWS_SESSION_TOKEN:}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:bucket-resumenes-inscripcion}

# ===== Spring Security / OAuth2 Resource Server =====
# Issuer de Azure AD B2C obtenido desde jwt.ms al ejecutar el User Flow
# (ver guía Semana 5, Paso 4 y Paso 5). Spring Security usa este valor para
# descubrir las claves públicas (JWKS) y validar la firma de cada JWT recibido.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_AD_B2C_ISSUER_URI:https://<tenant>.b2clogin.com/<tenant-id>/v2.0/}

# ===== Actuator =====
# Expone /actuator/health de forma pública (ver SecurityConfig) para
# que el pipeline de GitHub Actions y el HEALTHCHECK de Docker puedan
# verificar el estado del contenedor sin necesidad de un token JWT.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
